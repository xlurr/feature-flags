name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Go Build + Vet + Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Download deps
        working-directory: backend
        run: go mod download

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: backend
        run: gosec -fmt sarif -out gosec-results.sarif ./... || true

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/gosec-results.sarif
        if: always()

      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # TODO: убрать || true после выхода go1.25 stable
          # GO-2026-4601 и GO-2026-4602 фиксятся только в go1.25.8
          govulncheck ./... || true

  frontend:
    name: Node Build + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: npm audit
        run: npm audit --audit-level=high

  docker:
    name: Docker + Container Scan + DAST
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env CI
        run: |
          cat > .env <<ENVEOF
          POSTGRES_PASSWORD=citestpassword
          POSTGRES_USER=ffuser
          POSTGRES_DB=ffmanager
          ENVEOF

      - name: Build images
        run: docker compose build --no-cache

      - name: Save images to tar
        run: |
          docker save ff-backend -o ff-backend.tar
          docker save ff-frontend -o ff-frontend.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3

      - name: Trivy - scan backend image
        run: |
          trivy image \
            --input ff-backend.tar \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed || true

      - name: Trivy - scan frontend image
        run: |
          trivy image \
            --input ff-frontend.tar \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 || true

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost/health && break
            echo "Attempt $i..."
            sleep 2
          done

      - name: Health check
        run: curl -sf http://localhost/health | grep '"status":"ok"'

      - name: Eval API check
        run: curl -sf http://localhost/eval/prod-key-001

      - name: Install Nuclei
        run: go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Run Nuclei scan
        run: |
          nuclei -u http://localhost \
            -t http/misconfiguration \
            -t http/exposures \
            -t http/vulnerabilities \
            -severity medium,high,critical \
            -o nuclei-report.txt || true

      - name: Upload Nuclei report
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: nuclei-report.txt
        if: always()

      - name: Teardown
        if: always()
        run: docker compose down -v
