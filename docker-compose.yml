services:
  postgres:
    image: postgres:16-alpine
    container_name: ff-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ff_manager}
      POSTGRES_USER: ${POSTGRES_USER:-ff_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ff_user} -d ${POSTGRES_DB:-ff_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ff-backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-ff_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ff_manager}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ff-frontend
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    volumes:
      - sqlite-data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: ff-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  sqlite-data:
